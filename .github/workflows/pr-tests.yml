name: PR Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  test-go:
    name: Go Backend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
        
    # NOTE: intentionally NO manual actions/cache step here. `actions/setup-go`
    # above with `cache: true` already caches ~/go/pkg/mod + ~/.cache/go-build
    # keyed on go.sum (with restore-key fallback). A second actions/cache over
    # the SAME paths caused intermittent `tar: ... Cannot open: File exists`
    # failures (Go job exit 2): setup-go's restore populated the dirs first, then
    # the manual cache untarred its archive over the now-existing files and tar
    # aborted. One cache owner per path. See knowledge/ci-gotchas.md.
          
    - name: Install dependencies
      run: go mod download
      
    - name: Run Go tests
      run: make test
      
    - name: Run Go tests with coverage
      run: make test-coverage
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.out
        flags: go-backend
        name: go-backend-coverage
        fail_ci_if_error: false
        
    - name: Format check
      run: make fmt && git diff --exit-code
      
    - name: Lint check
      run: |
        # Pinned, not @latest: golangci-lint v2 (the current @latest) rejects
        # this repo's v1-format .golangci.yml with a hard config-load error,
        # which broke the Go job independently of any code change. Pin to the
        # last v1 release so the config is honored and CI is reproducible.
        # (To adopt v2 later: `golangci-lint migrate` the config + bump this pin.)
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
        make lint

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        
    - name: Install frontend dependencies
      working-directory: ui
      # npm ci (lockfile-exact), not npm install: the caret `^3.6.2` on
      # prettier let `npm install` drift to a newer release than the
      # package-lock's 3.8.4, and the newer prettier reformats a handful of
      # files, failing format:check independently of any code change. ci
      # pins to the lockfile so formatting is reproducible.
      run: npm ci

    - name: Run frontend linting
      working-directory: ui
      run: npm run lint
      
    - name: Check frontend formatting
      working-directory: ui
      run: npm run format:check
      
    - name: Run frontend tests
      working-directory: ui
      run: npm run test:ci
      
    - name: Build frontend
      working-directory: ui
      run: npm run build
      
    - name: Upload frontend coverage
      uses: codecov/codecov-action@v5
      with:
        directory: ui/coverage
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
        
    # NOTE: intentionally NO manual actions/cache step here. `actions/setup-go`
    # above with `cache: true` already caches ~/go/pkg/mod + ~/.cache/go-build
    # keyed on go.sum (with restore-key fallback). A second actions/cache over
    # the SAME paths caused intermittent `tar: ... Cannot open: File exists`
    # failures (Go job exit 2): setup-go's restore populated the dirs first, then
    # the manual cache untarred its archive over the now-existing files and tar
    # aborted. One cache owner per path. See knowledge/ci-gotchas.md.
          
    - name: Install dependencies
      run: go mod download
      
    - name: Build application (backend only)
      run: make build-backend
      
    - name: Run integration tests
      run: go test -v ./integration/...

  test-docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: make docker-build
      
    - name: Test Docker image
      run: |
        docker run --rm -d --name squadron-test -p 8080:8080 -p 4317:4317 -p 4318:4318 squadron:latest
        sleep 10
        # Test if the service is responding
        curl -f http://localhost:8080/health || exit 1
        docker stop squadron-test

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        
    - name: Run Trivy vulnerability scanner (SARIF)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      continue-on-error: true
      with:
        sarif_file: 'trivy-results.sarif'

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    needs: [test-go, test-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
        
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        go mod download
        cd ui && npm ci
        
    - name: Build full application
      run: make build
      
    - name: Verify binary exists
      run: test -f bin/squadron
      
    - name: Test binary version
      run: ./bin/squadron --help