name: Create and publish a Docker image

# Configures this workflow to run on Git tags (for versioned releases) or pushes to release branch
on:
  push:
    branches: ['main', 'release']
    tags:
      - 'v*.*.*'

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Cancel a superseded publish for the same ref while it's still running so
# rapid main pushes (dozens/day) don't pile up 40-min builds. Tag pushes are
# NEVER cancelled — each versioned release must publish its image.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Cap the job so a stuck emulated build fails in bounded time instead of
    # hanging to the 6h GitHub default (observed: one 6h 0m run).
    timeout-minutes: 45
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Set up QEMU for multi-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Uses the `docker/login-action` action to log in to the Container registry registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # This step uses [docker/metadata-action](https://github.com/docker/metadata-action#about) to extract tags and labels that will be applied to the specified image. The `id` "meta" allows the output of this step to be referenced in a subsequent step. The `images` value provides the base name for the tags and labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
      # This step uses the `docker/build-push-action` action to build the image, based on your repository's `Dockerfile`. If the build succeeds, it pushes the image to GitHub Packages.
      # It uses the `context` parameter to define the build's context as the set of files located in the specified path. For more information, see [Usage](https://github.com/docker/build-push-action#usage) in the README of the `docker/build-push-action` repository.
      # It uses the `tags` and `labels` parameters to tag and label the image with the output from the "meta" step.
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          # :latest (main/branch pushes) builds amd64 ONLY — fast, a few
          # minutes. Multi-arch (amd64+arm64; arm64 via slow QEMU emulation of
          # the cgo/DuckDB build, ~40min) is reserved for TAGGED releases, the
          # supported surface where arm64 users pull a version tag. Apple
          # Silicon can Rosetta-run the amd64 :latest.
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse layers across runs so unchanged deps aren't rebuilt each push.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build squadronctl binaries for every supported platform and attach
  # them to the GitHub release. Only runs on tag pushes; branch pushes
  # skip this job since there's no release artifact to attach to.
  build-cli:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build CLI for all platforms
        run: make build-cli-all-platforms VERSION=${{ github.ref_name }}

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/squadronctl-*
          fail_on_unmatched_files: true
          # The Docker job above also creates a release implicitly via
          # the tag; this step attaches our binaries to it.
          token: ${{ secrets.GITHUB_TOKEN }}
