name: Feature request
description: Suggest an enhancement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the underlying need, not just the solution you have in mind.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Squadron to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you use today, or other approaches you weighed.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Discovery (cloud scanning)
        - Recommendations / proposer
        - IaC PR remediation
        - Fleet / OpAMP / rollouts
        - Config editor
        - Cost / savings
        - Auth / security
        - Docs
        - Other
