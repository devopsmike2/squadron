version: "3.9"

x-collector-base: &collector-base
  image: otel/opentelemetry-collector-contrib:0.103.1
  command: ["--config=/config/collector.yaml"]
  restart: unless-stopped
  depends_on:
    - squadron

x-generator-base: &generator-base
  build:
    context: ./telemetrygen
  restart: unless-stopped

services:
  squadron:
    build:
      context: ../../..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "4317:4317"
      - "4318:4318"
    environment:
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data

  agent-01:
    <<: *collector-base
    hostname: agent-01
    volumes:
      - ./collectors/agent-01.yaml:/config/collector.yaml:ro

  agent-02:
    <<: *collector-base
    hostname: agent-02
    volumes:
      - ./collectors/agent-02.yaml:/config/collector.yaml:ro

  agent-03:
    <<: *collector-base
    hostname: agent-03
    volumes:
      - ./collectors/agent-03.yaml:/config/collector.yaml:ro

  agent-04:
    <<: *collector-base
    hostname: agent-04
    volumes:
      - ./collectors/agent-04.yaml:/config/collector.yaml:ro

  agent-05:
    <<: *collector-base
    hostname: agent-05
    volumes:
      - ./collectors/agent-05.yaml:/config/collector.yaml:ro

  agent-06:
    <<: *collector-base
    hostname: agent-06
    volumes:
      - ./collectors/agent-06.yaml:/config/collector.yaml:ro

  agent-07:
    <<: *collector-base
    hostname: agent-07
    volumes:
      - ./collectors/agent-07.yaml:/config/collector.yaml:ro

  agent-08:
    <<: *collector-base
    hostname: agent-08
    volumes:
      - ./collectors/agent-08.yaml:/config/collector.yaml:ro

  agent-09:
