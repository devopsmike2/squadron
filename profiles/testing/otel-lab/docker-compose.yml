    hostname: agent-09
    volumes:
      - ./collectors/agent-09.yaml:/config/collector.yaml:ro

  agent-10:
    <<: *collector-base
    hostname: agent-10
    volumes:
      - ./collectors/agent-10.yaml:/config/collector.yaml:ro
  telemetry-agent-01:
    <<: *generator-base
    depends_on:
      - agent-01
    command:
      [
        "traces",
        "--otlp-endpoint", "agent-01:4317",
        "--otlp-insecure",
        "--service", "loadgen-agent-01",
        "--rate", "2",
        "--duration", "720h",
        "--telemetry-attributes", 'env="test"',
        "--telemetry-attributes", 'profile="squadron-lab"',
        "--telemetry-attributes", 'target_agent="agent-01"'
      ]

  telemetry-agent-02:
