site_name: Squadron
site_description: The open-source OpenTelemetry control plane for coverage, cost, and safe rollouts.
site_url: https://devopsmike2.github.io/squadron/
repo_url: https://github.com/devopsmike2/squadron
repo_name: devopsmike2/squadron
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle: { icon: material/weather-sunny, name: Light mode }
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle: { icon: material/weather-night, name: Dark mode }
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc: { permalink: true }
  - pymdownx.details
  - pymdownx.tabbed: { alternate_style: true }
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

exclude_docs: |
  README.md
  design/
  proposals/
  investigations/
  stress-tests/
  audit/
  architecture/
  linkedin-posts/
  *-design.md
  thesis.md
  positioning.md
  state-of-the-product.md
  roadmap-post-v0.52.md
  oss-working-features-audit.md
  oss-ga-and-enterprise-boundary.md
  proposer-bench.md
  scale-testing.md
  demo-script.md
  demo-video-script.md
  demo-walkthrough.md
  linkedin-rollout.md
  board.html
  k8s-deploy-test-*.md

