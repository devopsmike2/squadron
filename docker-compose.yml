# Squadron — default stack (production-like, one command).
#
# Pulls the published image (Go binary serving the UI + API together on
# one port, 8080) and starts a demo OpenTelemetry collector managed over
# OpAMP, so a fresh clone lands on a working dashboard with a live agent:
#
#   docker compose up -d
#   open http://localhost:8080/quickstart
#
# No build from source and nothing to configure — discovery
# auto-generates its secrets key on first boot and persists it to the
# squadron-data volume. Add an ANTHROPIC_API_KEY (shell or repo-root
# .env) to enable the AI features.
#
# Contributors changing Squadron's own code want hot reload instead:
#   docker compose -f docker-compose.dev.yml up      # UI on :5173
services:
  squadron:
    image: ghcr.io/devopsmike2/squadron:latest
    container_name: squadron
    ports:
      - "8080:8080"    # UI + HTTP API (open this)
      - "4320:4320"    # OpAMP server (agents connect here)
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    volumes:
      # Persist the data dir: SQLite stores + the auto-generated
      # secrets.key, so discovery stays configured across restarts.
      - squadron-data:/app/data
      # Repo config for the demo (OpAMP server + pipelines). Optional —
      # remove this mount to use the image's baked-in default config.
      - ./squadron.yaml:/app/squadron.yaml:ro
    environment:
      - GIN_MODE=release
      - LOG_LEVEL=info
      - LOG_FORMAT=console
      - TZ=UTC
      # AI assist (optional): set ANTHROPIC_API_KEY in your shell or a
      # repo-root .env to enable AI explanations + recommendations.
      # Empty when unset — Squadron logs AI as disabled and hides the
      # AI affordances in the UI.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Discovery secrets key (optional): leave unset and Squadron
      # auto-generates + persists one on first boot. Set it (base64 of
      # 32 bytes — `head -c 32 /dev/urandom | base64`) to supply your
      # own key or share one across replicas.
      - SQUADRON_SECRETS_KEY=${SQUADRON_SECRETS_KEY:-}
      # AWS credentials (optional): the base identity discovery uses to
      # assume the SquadronDiscovery role in a connected account. Leave
      # unset until you connect an AWS account.
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - squadron-network

  # Demo OpenTelemetry Collector — gives the quickstart a live agent to
  # show in the Fleet view. Remove this + supervisor for a bare install.
  collector:
    image: otel/opentelemetry-collector-contrib:0.134.1
    container_name: demo-collector
    command: ['--config', '/etc/otelcol-contrib/config.yaml']
    ports:
      - "4319:4317"    # OTLP gRPC receiver
      - "4321:4318"    # OTLP HTTP receiver
      - "13133:13133"  # Health check
    volumes:
      - ./examples/collector/demo-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - squadron
    networks:
      - squadron-network
    restart: unless-stopped

  # Demo OpAMP supervisor — registers the collector as a managed agent
  # so it appears in the Fleet view on first load.
  supervisor:
    build:
      context: ./examples/supervisor
      dockerfile: Dockerfile
    container_name: demo-supervisor
    depends_on:
      - squadron
    networks:
      - squadron-network
    restart: unless-stopped

volumes:
  squadron-data:
    driver: local

networks:
  squadron-network:
    driver: bridge
