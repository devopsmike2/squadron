server:
  http_port: 8080
  opamp_port: 4320

otlp:
  grpc_endpoint: 0.0.0.0:4317
  http_endpoint: 0.0.0.0:4318
  # Optional: Endpoint to offer to agents for sending their own telemetry
  # If not set, uses grpc_endpoint with 0.0.0.0 converted to localhost
  # For Docker Compose, use the service name
  # For gRPC: "squadron:4317" (bare endpoint)
  # For HTTP: "squadron:4318" (bare endpoint - supervisor adds http:// prefix)
  agent_grpc_endpoint: ""  # Empty = use grpc_endpoint with localhost conversion
  agent_http_endpoint: "squadron:4318"  # HTTP endpoint for agent own telemetry

storage:
  app:
    type: sqlite
    path: ./data/app.db
  telemetry:
    type: duckdb
    path: ./data/telemetry.db

retention:
  raw_metrics: 24h
  raw_logs: 24h
  rollups_1m: 7d
  rollups_5m: 30d

rollups:
  enabled: true
  interval_1m: "*/1 * * * *"
  interval_5m: "*/5 * * * *"

logging:
  level: info
  format: json

worker:
  queue_size: 10000
  workers: 3
  timeout: 5s

auth:
  # When true, every /api/v1/* request must carry a valid Bearer token.
  # /metrics and /health stay public for scrapers and load balancers.
  # On first start with auth enabled and an empty tokens table, Squadron
  # emits a bootstrap token to stderr that operators use to log in and
  # create proper tokens. See docs/auth.md for the full flow.
  enabled: false

telemetry:
  # When true, Squadron exports its own state changes as OpenTelemetry
  # traces AND bridges the Prometheus /metrics surface to OTLP
  # metrics on the same endpoint. See docs/self-monitoring.md.
  enabled: false
  service_name: squadron
  metric_interval: 30s  # how often the Prom-to-OTLP bridge scrapes the registry
  otlp:
    endpoint: ""        # e.g. otel-collector:4317 or api.honeycomb.io
    protocol: grpc      # grpc | http
    insecure: false     # set true for plaintext local OTLP
    headers: {}         # e.g. authorization: "Bearer <api-key>"

# v0.26 AI assist. Wraps the Anthropic Messages API. Off by
# default. See docs/ai-assist.md for the full setup, model
# defaults, cost shape, and what's sent to Anthropic per action.
ai:
  enabled: true
  # api_key: ""                    # NOT recommended; prefer the env var below
  api_key_env: ANTHROPIC_API_KEY   # name of the env var to read the key from
  # base_url: https://api.anthropic.com
  # explain_model: claude-haiku-4-5-20251001
  # merge_model: claude-sonnet-4-6
  # max_tokens: 1024

# v0.27 Pricing — translates the v0.24 byte numbers into $/month
# figures so the Savings dashboard speaks the operator's language.
# When enabled with no rules, Squadron uses pricing.DefaultConfig
# (sensible starter rates for major destinations + $0.30/GB
# catch-all). Tune the per-destination rates against your actual
# invoice for accurate projections. See docs/savings.md.
pricing:
  enabled: true
  currency: USD
  # rules:
  #   - match: "datadog"      # substring match against destination_key
  #     label: "Datadog"
  #     price_per_gb: 0.30
  #     traces: 1.50           # per-signal overrides (optional)
  #     logs:   0.10
  #     metrics: 0.50
  #   - match: ""              # catch-all; auto-appended if missing
  #     label: "Other"
  #     price_per_gb: 0.30
