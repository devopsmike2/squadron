# Squadron — standalone stack (no clone, no build, one command).
#
# This is the zero-checkout path: fetch just this file and start. It pulls
# only published images, so you do NOT need the source tree.
#
#   curl -fsSL https://raw.githubusercontent.com/devopsmike2/squadron/main/deploy/docker-compose.yml -o docker-compose.yml
#   docker compose up -d
#   open http://localhost:8080/quickstart
#
# Or one step:
#   curl -fsSL https://raw.githubusercontent.com/devopsmike2/squadron/main/install.sh | sh
#
# Squadron auto-generates its discovery secrets key on first boot and
# persists it to the squadron-data volume — nothing to configure. A demo
# OpenTelemetry collector connects over OpAMP so the Fleet view has a live
# agent on first load. Add ANTHROPIC_API_KEY (shell or .env) for AI.
#
# Pin a version: SQUADRON_VERSION=v0.89.292 docker compose up -d
services:
  squadron:
    image: ghcr.io/devopsmike2/squadron:${SQUADRON_VERSION:-latest}
    ports:
      - "8080:8080"    # UI + HTTP API (open this)
      - "4320:4320"    # OpAMP server (agents connect here)
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    volumes:
      - squadron-data:/app/data   # SQLite stores + auto-generated secrets.key
    environment:
      - GIN_MODE=release
      - LOG_LEVEL=info
      - LOG_FORMAT=console
      - TZ=UTC
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}          # optional: enables AI
      - SQUADRON_SECRETS_KEY=${SQUADRON_SECRETS_KEY:-}     # optional: auto-generated if unset
      - SQUADRON_GITHUB_WEBHOOK_SECRET=${SQUADRON_GITHUB_WEBHOOK_SECRET:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks: [squadron-network]

  # Demo OpenTelemetry collector — connects over OpAMP so a managed agent
  # appears in the Fleet view immediately. Config is inlined (no checkout
  # needed). Remove this service for a bare install.
  collector:
    image: otel/opentelemetry-collector-contrib:0.134.1
    command: ['--config', '/etc/otelcol-contrib/config.yaml']
    configs:
      - source: demo_collector_config
        target: /etc/otelcol-contrib/config.yaml
    depends_on: [squadron]
    restart: unless-stopped
    networks: [squadron-network]

configs:
  demo_collector_config:
    content: |
      receivers:
        otlp:
          protocols:
            grpc: { endpoint: 0.0.0.0:4317 }
            http: { endpoint: 0.0.0.0:4318 }
      processors:
        batch: { timeout: 1s, send_batch_size: 1024 }
      exporters:
        debug:
      extensions:
        health_check: { endpoint: 0.0.0.0:13133 }
        opamp:
          server:
            ws: { endpoint: ws://squadron:4320/v1/opamp }
          agent_description: { include_resource_attributes: true }
          capabilities: { reports_effective_config: true, reports_health: true }
      service:
        extensions: [opamp, health_check]
        pipelines:
          traces:  { receivers: [otlp], processors: [batch], exporters: [debug] }
          metrics: { receivers: [otlp], processors: [batch], exporters: [debug] }
          logs:    { receivers: [otlp], processors: [batch], exporters: [debug] }
        telemetry:
          resource:
            agent.group_name: demo-group
            service.name: demo-collector
            deployment.environment: development
          metrics:
            readers:
              - periodic:
                  interval: 30
                  exporter:
                    otlp: { protocol: grpc, endpoint: http://squadron:4317 }

volumes:
  squadron-data:
    driver: local

networks:
  squadron-network:
    driver: bridge
