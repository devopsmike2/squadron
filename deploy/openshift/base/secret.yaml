# Stub Secret. Overlays should override with real values via
# secretGenerator or external secret management (Vault, ESO).
# Never commit real keys here.
#
# Two slots:
#   - ANTHROPIC_API_KEY: optional; enables AI assist features.
#     Leave empty to keep AI off (the rest of Squadron works
#     without it).
#   - BOOTSTRAP_TOKEN: optional; the initial admin API token.
#     If empty, Squadron auto-generates one on first start and
#     logs it. You'll need that token to hit the API; pull it
#     from the pod logs with `oc logs deployment/squadron`.
apiVersion: v1
kind: Secret
metadata:
  name: squadron-secrets
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ""
  BOOTSTRAP_TOKEN: ""
