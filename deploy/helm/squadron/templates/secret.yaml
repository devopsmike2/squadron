{{- if and (not .Values.secrets.existingSecret) (include "squadron.hasInlineSecrets" .) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "squadron.secretName" . }}
  labels:
    {{- include "squadron.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.squadronSecretsKey }}
  SQUADRON_SECRETS_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubWebhookSecret }}
  SQUADRON_GITHUB_WEBHOOK_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.awsSecretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.awsSessionToken }}
  AWS_SESSION_TOKEN: {{ . | quote }}
  {{- end }}
{{- end }}
