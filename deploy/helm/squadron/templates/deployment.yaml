apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "squadron.fullname" . }}
  labels:
    {{- include "squadron.labels" . | nindent 4 }}
spec:
  # Squadron OSS is single-instance (embedded SQLite + data dir). Do not
  # scale beyond 1 replica; HA is an enterprise concern.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "squadron.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "squadron.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "squadron.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: squadron
          image: {{ include "squadron.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - { name: http, containerPort: 8080, protocol: TCP }
            - { name: opamp, containerPort: 4320, protocol: TCP }
            - { name: otlp-grpc, containerPort: 4317, protocol: TCP }
            - { name: otlp-http, containerPort: 4318, protocol: TCP }
          env:
            - { name: GIN_MODE, value: {{ .Values.config.ginMode | quote }} }
            - { name: LOG_LEVEL, value: {{ .Values.config.logLevel | quote }} }
            - { name: LOG_FORMAT, value: {{ .Values.config.logFormat | quote }} }
            - { name: TZ, value: {{ .Values.config.timezone | quote }} }
            - { name: AWS_REGION, value: {{ .Values.config.awsRegion | quote }} }
          {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.secrets.existingSecret (include "squadron.hasInlineSecrets" .) }}
          envFrom:
            - secretRef:
                name: {{ include "squadron.secretName" . }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "squadron.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
