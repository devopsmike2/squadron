# Squadron Helm values. Squadron OSS is single-instance (embedded SQLite +
# data dir), so replicaCount is fixed at 1; HA is an enterprise concern.

image:
  repository: ghcr.io/devopsmike2/squadron
  # Leave empty to use the chart's appVersion. Set to pin (e.g. "v0.89.292"
  # or "latest").
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Non-sensitive runtime config -> env vars.
config:
  ginMode: release
  logLevel: info
  logFormat: console
  timezone: UTC
  awsRegion: us-east-1

# Sensitive values. Either set them inline here (a Secret is created), or
# point existingSecret at a Secret you manage with the same keys.
secrets:
  existingSecret: ""        # name of a pre-existing Secret (takes precedence)
  anthropicApiKey: ""       # ANTHROPIC_API_KEY — enables AI features
  squadronSecretsKey: ""    # SQUADRON_SECRETS_KEY — auto-generated if empty
  githubWebhookSecret: ""   # SQUADRON_GITHUB_WEBHOOK_SECRET
  awsAccessKeyId: ""        # AWS_ACCESS_KEY_ID
  awsSecretAccessKey: ""    # AWS_SECRET_ACCESS_KEY
  awsSessionToken: ""       # AWS_SESSION_TOKEN

# Persistent data dir (/app/data): SQLite stores + auto-generated secrets.key.
persistence:
  enabled: true
  size: 5Gi
  storageClass: ""          # "" = cluster default
  accessMode: ReadWriteOnce
  existingClaim: ""

service:
  type: ClusterIP
  ports:
    http: 8080              # UI + API
    opamp: 4320             # agents connect here
    otlpGrpc: 4317
    otlpHttp: 4318
  annotations: {}

# Ingress for the UI/API (port 8080) only. Expose OpAMP/OTLP separately if
# agents live outside the cluster (e.g. a LoadBalancer service).
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: squadron.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 2Gi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

podAnnotations: {}

# Pod-level security context. fsGroup is REQUIRED on plain Kubernetes when
# persistence is enabled: the image runs as non-root UID 1001 (group 0), but a
# freshly-provisioned PVC (e.g. Azure Disk / EBS / PD) mounts as root:root 0755,
# so without fsGroup the container cannot create ./data/app.db and crash-loops
# with "unable to open database file". fsGroup makes the kubelet chown the volume
# so UID 1001 can write. OnRootMismatch avoids re-chowning a large volume every
# start. On OpenShift, clear this (podSecurityContext: {}) and let the
# restricted-v2 SCC assign fsGroup/UID from the namespace range instead.
podSecurityContext:
  fsGroup: 1001
  fsGroupChangePolicy: OnRootMismatch
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 0
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
nodeSelector: {}
tolerations: []
affinity: {}
extraEnv: []
